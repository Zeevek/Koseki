<style>
:root{
  --papier:#F7F5EF; --papier-2:#FFFFFF; --encre:#22303F; --encre-doux:#4A5A6E;
  --greffe:#A23A27; --greffe-pale:#F4E6DF; --ligne:#DAD4C6; --ligne-forte:#B8AF9C;
  --ok:#3E6B4F; --ok-pale:#E4EEE7; --warn:#8A6D1F; --warn-pale:#F5EDDA;
  --ombre:0 1px 3px rgba(34,48,63,.10), 0 4px 14px rgba(34,48,63,.06);
  --f-display:"Didot","Bodoni MT","Playfair Display","Georgia",serif;
  --f-body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  --f-data:ui-monospace,"SF Mono","Cascadia Mono","Consolas",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;touch-action:manipulation}
body{overscroll-behavior-y:contain}
/* iOS zoome automatiquement sur un champ dont le texte fait moins de 16px */
@media (max-width:900px){
  input,select,textarea{font-size:16px!important}
  label.champ input,label.champ select,label.champ textarea{font-size:16px}
}
body{font-family:var(--f-body);background:var(--papier);color:var(--encre);font-size:15px;line-height:1.5}
button{font:inherit;cursor:pointer;color:inherit;background:none;border:none}
input,select,textarea{font:inherit;color:var(--encre)}
a{color:var(--greffe)}
:focus-visible{outline:2px solid var(--greffe);outline-offset:2px}

/* ---------- Coquille ---------- */
#app{display:grid;grid-template-rows:auto auto 1fr;min-height:100vh}
header.barre{display:flex;align-items:center;gap:14px;padding:10px 18px;background:var(--encre);color:var(--papier);flex-wrap:wrap}
.marque{font-family:var(--f-display);font-size:21px;letter-spacing:.5px;white-space:nowrap;display:flex;align-items:center;gap:10px}
.sceau-hdr{width:30px;height:30px;flex:none;object-fit:contain}
.sceau-vide{width:76px;height:76px;margin-bottom:4px;object-fit:contain}
.marque em{font-size:15px;letter-spacing:2px}
.marque em{font-style:normal;color:#E3C08F}
#selProjet{background:#33445A;color:var(--papier);border:1px solid #4A5A6E;border-radius:6px;padding:5px 8px;max-width:220px}
#etatSauvegarde{font-size:12px;color:#9FB0C4;margin-left:auto;white-space:nowrap}
#rechGlobale{background:#33445A;border:1px solid #4A5A6E;border-radius:6px;color:var(--papier);padding:6px 10px;width:200px}
#rechGlobale::placeholder{color:#8FA0B4}
nav.onglets{display:flex;gap:2px;background:var(--papier-2);border-bottom:1px solid var(--ligne);padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
nav.onglets::-webkit-scrollbar{display:none}
@media (max-width:640px){
  header.barre{gap:8px;padding:8px 12px}
  .marque{font-size:17px;gap:7px}
  .sceau-hdr{width:26px;height:26px}
  #selProjet{max-width:120px;font-size:13px}
  #rechGlobale{width:100%;order:5}
  header.barre > div[style*="margin-left:auto"]{order:5;width:100%;margin-left:0!important}
  #etatSauvegarde{font-size:11px}
  #resRecherche{width:calc(100vw - 40px);right:0}
  nav.onglets button{padding:11px 11px;font-size:13.5px}
  table.reg th,table.reg td{padding:6px 5px;font-size:13px}
  /* le texte s'enroule au lieu d'élargir la page */
  table.reg{table-layout:fixed;width:100%}
  table.reg th,table.reg td{overflow-wrap:anywhere;word-break:break-word;white-space:normal}
  table.reg .mono{font-size:11.5px}
  input[type=file]{max-width:100%}
  .carte{overflow-x:hidden}
  #zoneDepot{overflow:hidden}
  textarea{max-width:100%}
  main{overflow-x:hidden}
}
nav.onglets button{padding:11px 14px;font-size:14px;color:var(--encre-doux);border-bottom:2px solid transparent;white-space:nowrap}
nav.onglets button.actif{color:var(--greffe);border-bottom-color:var(--greffe);font-weight:600}
main{padding:20px;max-width:1180px;width:100%;margin:0 auto}
.vue{display:none}.vue.actif{display:block}

/* ---------- Composants ---------- */
h1.titreVue{font-family:var(--f-display);font-size:26px;font-weight:500;margin-bottom:4px}
.sousTitre{color:var(--encre-doux);font-size:13px;margin-bottom:18px}
.carte{background:var(--papier-2);border:1px solid var(--ligne);border-radius:10px;box-shadow:var(--ombre);padding:16px;margin-bottom:16px}
.carte h2{font-family:var(--f-display);font-size:17px;font-weight:600;margin-bottom:10px}
.grille{display:grid;gap:14px}
.grille.c2{grid-template-columns:1fr 1fr}
.grille.c3{grid-template-columns:repeat(3,1fr)}
.grille.c4{grid-template-columns:repeat(4,1fr)}
@media(max-width:820px){.grille.c2,.grille.c3,.grille.c4{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.grille.c2,.grille.c3,.grille.c4{grid-template-columns:1fr}main{padding:12px}}
.stat{text-align:center;padding:14px 8px}
.stat .n{font-family:var(--f-display);font-size:30px;color:var(--greffe)}
.stat .l{font-size:12px;color:var(--encre-doux);text-transform:uppercase;letter-spacing:.6px;margin-top:2px}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--encre);color:var(--papier);border-radius:7px;padding:8px 14px;font-size:14px;font-weight:500}
.btn:hover{background:#33445A}
.btn.rouge{background:var(--greffe)}.btn.rouge:hover{background:#B54B33}
.btn.clair{background:var(--papier);color:var(--encre);border:1px solid var(--ligne-forte)}
.btn.clair:hover{background:#EFEBE1}
.btn.petit{padding:4px 10px;font-size:13px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.rang{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;font-size:11.5px;padding:2px 8px;border-radius:20px;background:var(--papier);border:1px solid var(--ligne);color:var(--encre-doux)}
.badge.h{background:#E7EDF5;color:#33506E;border-color:#C7D4E4}
.badge.f{background:var(--greffe-pale);color:var(--greffe);border-color:#E2C4C7}
.badge.ok{background:var(--ok-pale);color:var(--ok);border-color:#C4D8CB}
.badge.warn{background:var(--warn-pale);color:var(--warn);border-color:#E4D5A8}
.vide{padding:36px 20px;text-align:center;color:var(--encre-doux)}
.vide .gros{font-family:var(--f-display);font-size:20px;color:var(--encre);margin-bottom:8px}

/* Champs */
label.champ{display:block;font-size:12.5px;color:var(--encre-doux);margin-bottom:10px}
label.champ span{display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;font-size:11px}
label.champ input,label.champ select,label.champ textarea{width:100%;border:1px solid var(--ligne-forte);border-radius:6px;padding:7px 9px;background:var(--papier-2);font-size:14px}
label.champ textarea{min-height:70px;resize:vertical}
.aide{font-size:11.5px;color:var(--encre-doux);margin-top:2px}

/* Tableaux */
table.reg{width:100%;border-collapse:collapse;font-size:14px}
table.reg th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--encre-doux);padding:6px 8px;border-bottom:2px solid var(--ligne-forte)}
table.reg td{padding:7px 8px;border-bottom:1px solid var(--ligne);vertical-align:top}
table.reg tr.clic{cursor:pointer}
table.reg tr.clic:hover{background:#F1EDE3}
.mono{font-family:var(--f-data);font-size:12.5px}
.lienPers{color:var(--greffe);text-decoration:none;font-weight:500;cursor:pointer}
.lienPers:hover{text-decoration:underline}

/* ---------- Fiche personne : style acte avec mention marginale ---------- */
.acte{display:grid;grid-template-columns:170px 1fr;gap:0;background:var(--papier-2);border:1px solid var(--ligne);border-radius:10px;box-shadow:var(--ombre);overflow:hidden;margin-bottom:16px}
.acte .marge{border-right:2px solid var(--greffe);background:#FBF9F4;padding:16px 12px;font-size:12px;color:var(--encre-doux)}
.acte .marge .mention{margin-bottom:12px}
.acte .marge .mention b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--greffe);margin-bottom:2px}
.acte .corps{padding:18px 20px}
.acte h1.nomActe{font-family:var(--f-display);font-size:28px;font-weight:500;line-height:1.15}
.acte h1.nomActe .patro{text-transform:uppercase;letter-spacing:1px}
.acte .datesVie{font-family:var(--f-data);font-size:13px;color:var(--encre-doux);margin:4px 0 14px}
@media(max-width:640px){.acte{grid-template-columns:1fr}.acte .marge{border-right:none;border-bottom:2px solid var(--greffe);display:flex;gap:16px;flex-wrap:wrap}.acte .marge .mention{margin-bottom:0}}
.evtLigne{display:grid;grid-template-columns:110px 1fr auto;gap:10px;padding:8px 0;border-bottom:1px dashed var(--ligne);align-items:baseline}
.evtLigne .tE{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--greffe);font-weight:600}
.evtLigne .dE{font-family:var(--f-data);font-size:13px}
.evtLigne .pE{font-size:13.5px;color:var(--encre-doux)}
@media(max-width:520px){.evtLigne{grid-template-columns:1fr auto}}
.famBloc{border:1px solid var(--ligne);border-radius:8px;padding:12px;margin-bottom:10px;background:#FCFBF7}
.famBloc h3{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--encre-doux);margin-bottom:8px}
.famBloc ul{list-style:none}
.famBloc li{padding:3px 0}

/* ---------- Arbre SVG ---------- */
#zoneArbre{background:var(--papier-2);border:1px solid var(--ligne);border-radius:10px;box-shadow:var(--ombre);overflow:hidden;position:relative}
#svgArbre{width:100%;height:min(70vh,620px);display:block;touch-action:none;cursor:grab}
#svgArbre:active{cursor:grabbing}
.zoomBtns{position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px;z-index:5}
.zoomBtns button{width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.95);border:1px solid var(--ligne-forte);
  font-size:19px;line-height:1;color:var(--encre);box-shadow:var(--ombre);display:flex;align-items:center;justify-content:center}
.zoomBtns button.min{font-size:12px}
@media (max-width:640px){ #svgArbre{height:min(62vh,520px)} }
#svgArbre text{font-family:var(--f-body)}
#svgArbre .boitePers{cursor:pointer}
#svgArbre .boitePers rect{fill:#FCFBF7;stroke:var(--ligne-forte);stroke-width:1;rx:5;vector-effect:non-scaling-stroke}
#svgArbre .boitePers:hover rect{stroke:var(--greffe);stroke-width:1.5}
#svgArbre .boitePers.centre rect{fill:var(--greffe-pale);stroke:var(--greffe)}
#svgArbre .trait{stroke:var(--ligne-forte);stroke-width:1.2;fill:none;vector-effect:non-scaling-stroke}
#svgArbre .nomB{font-size:12px;font-weight:600;fill:var(--encre)}
#svgArbre .patB{font-size:11px;fill:var(--greffe);letter-spacing:.5px}
#svgArbre .datB{font-size:10.5px;fill:var(--encre-doux);font-family:var(--f-data)}
#svgArbre .videB rect{stroke-dasharray:4 3;fill:none}
#svgArbre .videB text{fill:var(--ligne-forte);font-size:11px}

/* Descendance */
ul.desc{list-style:none;margin-left:0}
ul.desc ul{margin-left:22px;border-left:1px solid var(--ligne);padding-left:12px}
ul.desc li{padding:3px 0}
ul.desc .conjoint{color:var(--encre-doux);font-size:13px}

/* Barre naissances (dashboard) */
.histo{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:8px}
.histo .col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:3px;min-width:0}
.histo .col .b{width:100%;background:var(--encre);border-radius:3px 3px 0 0;min-height:2px}
.histo .col .b.acc{background:var(--greffe)}
.histo .col .lab{font-size:9.5px;color:var(--encre-doux);font-family:var(--f-data);white-space:nowrap}
.histo .col .val{font-size:10px;color:var(--encre-doux)}
.listeTop{list-style:none}
.listeTop li{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dashed var(--ligne);font-size:13.5px}
.listeTop li b{font-family:var(--f-data);font-weight:400;color:var(--encre-doux)}

/* ---------- Modales ---------- */
dialog{border:none;border-radius:12px;box-shadow:0 10px 40px rgba(34,48,63,.35);padding:0;max-width:560px;width:calc(100% - 32px);background:var(--papier-2)}
dialog::backdrop{background:rgba(34,48,63,.45)}
dialog .dTete{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--ligne)}
dialog .dTete h2{font-family:var(--f-display);font-size:18px}
dialog .dCorps{padding:16px 18px;max-height:66vh;overflow:auto}
dialog .dPied{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--ligne)}
.fermer{font-size:20px;color:var(--encre-doux);line-height:1}
#resRecherche{position:absolute;top:52px;right:18px;background:var(--papier-2);border:1px solid var(--ligne);border-radius:8px;box-shadow:var(--ombre);max-height:320px;overflow:auto;width:320px;z-index:50;display:none}
#resRecherche div{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--ligne);font-size:14px}
#resRecherche div:hover{background:#F1EDE3}
#resRecherche small{color:var(--encre-doux);font-family:var(--f-data)}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--encre);color:var(--papier);padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:100}
#toast.visible{opacity:1}

/* Impression fiche */
@media print{
  header.barre,nav.onglets,.pasImpr,#toast{display:none!important}
  body{background:#fff}
  main{max-width:none;padding:0}
  .vue{display:none}.vue.actif{display:block}
  .carte,.acte{box-shadow:none;break-inside:avoid}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>

<script>
"use strict";
/* =====================================================================
   Koseki（戸籍）— application de généalogie hors-ligne
   Fichier unique, sans dépendance. GEDCOM 5.5.1 sans perte.
   ===================================================================== */

/* ---------- Utilitaires ---------- */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const norm = s => String(s ?? "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
const MOIS = {JAN:"janv.",FEB:"févr.",MAR:"mars",APR:"avr.",MAY:"mai",JUN:"juin",JUL:"juil.",AUG:"août",SEP:"sept.",OCT:"oct.",NOV:"nov.",DEC:"déc."};
const QUALIF = {ABT:"vers",EST:"estimé",CAL:"calculé",BEF:"avant",AFT:"après",FROM:"de",TO:"à",BET:"entre",AND:"et"};
function dateFr(g){ // date GEDCOM -> affichage français
  if(!g) return "";
  return g.split(" ").map(t => MOIS[t] || QUALIF[t] || t).join(" ");
}
function annee(g){ const m = /(\d{4})/.exec(g||""); return m ? +m[1] : null; }
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("visible"); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("visible"),2400); }

const TYPES_EVT = [
  ["BIRT","Naissance"],["CHR","Baptême"],["DEAT","Décès"],["BURI","Inhumation"],
  ["MARR","Mariage"],["DIV","Divorce"],["OCCU","Profession"],["RESI","Résidence"],
  ["EMIG","Émigration"],["IMMI","Immigration"],["EVEN","Événement"],["EDUC","Études"],
  ["RETI","Retraite"],["WILL","Testament"],["CENS","Recensement"]
];
const LIB_EVT = Object.fromEntries(TYPES_EVT);
const EVT_INDI = new Set(["BIRT","CHR","DEAT","BURI","OCCU","RESI","EMIG","IMMI","EVEN","EDUC","RETI","WILL","CENS","BAPM","CREM","ADOP","CONF","GRAD","NATU","PROB"]);

/* ---------- Parseur GEDCOM sans perte ----------
   Chaque enregistrement conserve ses lignes brutes {niv, tag, val}.
   Les balises inconnues sont préservées telles quelles à l'export. */
function parseGedcom(texte){
  const corps = texte.replace(/^\uFEFF/, "");
  // séparateur détecté : CRLF si présent (les \n nus restent alors DANS les valeurs,
  // cas des notes MyHeritage), sinon LF
  const eol = corps.includes("\r\n") ? "\r\n" : "\n";
  const lignes = corps.split(eol);
  if(lignes[lignes.length - 1] === "") lignes.pop(); // fin de fichier
  const enregs = []; enregs.eol = eol;
  let cur = null;
  for(const brute of lignes){
    const m = /^(\d+)\s+(?:(@[^@]+@)\s+)?(\S+)(?: ([\s\S]*))?$/.exec(brute);
    if(!m){
      // ligne non conforme ou vide (notes MyHeritage avec sauts de ligne bruts…) :
      // préservée telle quelle pour garantir l'aller-retour sans perte
      if(cur) cur.lignes.push({ niv: 9, tag: "_BRUT", val: "", brut: brute });
      continue;
    }
    const niv = +m[1], xref = m[2] || null, tag = m[3], val = m[4] ?? "";
    if(niv === 0){
      cur = { xref, tag, val, lignes: [] };
      enregs.push(cur);
    } else if(cur){
      cur.lignes.push({ niv, tag, val });
    }
  }
  return enregs;
}
function serialiserGedcom(enregs){
  const out = [];
  for(const r of enregs){
    out.push(r.xref ? `0 ${r.xref} ${r.tag}` : `0 ${r.tag}${r.val ? " "+r.val : ""}`);
    for(const l of r.lignes) out.push(l.brut !== undefined ? l.brut : `${l.niv} ${l.tag}${l.val !== "" ? " "+l.val : ""}`);
  }
  if(!enregs.some(r => r.tag === "TRLR")) out.push("0 TRLR");
  const eol = enregs.eol || "\r\n";
  return "\uFEFF" + out.join(eol) + eol;
}

/* Blocs de niveau 1 dans un enregistrement (événement + ses sous-lignes) */
function blocs(rec){
  const res = [];
  for(let i = 0; i < rec.lignes.length; i++){
    if(rec.lignes[i].niv === 1){
      let j = i + 1;
      while(j < rec.lignes.length && rec.lignes[j].niv > 1) j++;
      res.push({ debut: i, fin: j, tag: rec.lignes[i].tag, val: rec.lignes[i].val });
    }
  }
  return res;
}
function sousVal(rec, debut, fin, tag){
  for(let i = debut + 1; i < fin; i++){
    if(rec.lignes[i].niv === 2 && rec.lignes[i].tag === tag){
      let v = rec.lignes[i].val;
      for(let j = i + 1; j < fin && rec.lignes[j].niv > 2; j++){
        if(rec.lignes[j].tag === "CONC") v += rec.lignes[j].val;
        if(rec.lignes[j].tag === "CONT") v += "\n" + rec.lignes[j].val;
      }
      return v;
    }
  }
  return "";
}
function texteNote(rec, b){ // NOTE avec CONC/CONT
  let v = rec.lignes[b.debut].val;
  for(let i = b.debut + 1; i < b.fin; i++){
    const l = rec.lignes[i];
    if(l.tag === "CONC") v += l.val;
    else if(l.tag === "CONT") v += "\n" + l.val;
  }
  return v;
}

/* ---------- Modèle : index construit sur les enregistrements ---------- */
const M = {
  enregs: [], indis: new Map(), fams: new Map(),
  reconstruire(){
    this.indis.clear(); this.fams.clear();
    for(const r of this.enregs){
      if(r.tag === "INDI" && r.xref) this.indis.set(r.xref, this.indexerIndi(r));
      else if(r.tag === "FAM" && r.xref) this.fams.set(r.xref, this.indexerFam(r));
    }
  },
  indexerIndi(r){
    const ix = { id: r.xref, rec: r, givn:"", surn:"", sexe:"U", evts:[], famc:[], fams:[], notes:[], nbSources:0 };
    for(const b of blocs(r)){
      switch(b.tag){
        case "NAME": {
          if(ix.givn || ix.surn) break;
          const m = /^([^/]*)\/([^/]*)\//.exec(b.val);
          if(m){ ix.givn = m[1].trim(); ix.surn = m[2].trim(); }
          else ix.givn = b.val.trim();
          const g = sousVal(r, b.debut, b.fin, "GIVN"), s = sousVal(r, b.debut, b.fin, "SURN");
          if(g) ix.givn = g; if(s) ix.surn = s;
          break;
        }
        case "SEX": ix.sexe = b.val || "U"; break;
        case "FAMC": ix.famc.push(b.val); break;
        case "FAMS": ix.fams.push(b.val); break;
        case "NOTE": ix.notes.push(texteNote(r, b)); break;
        case "SOUR": ix.nbSources++; break;
        default:
          if(EVT_INDI.has(b.tag)){
            ix.evts.push({ tag:b.tag, val:b.val, date:sousVal(r,b.debut,b.fin,"DATE"), lieu:sousVal(r,b.debut,b.fin,"PLAC"), b });
          }
      }
    }
    const n = ix.evts.find(e => e.tag==="BIRT"), d = ix.evts.find(e => e.tag==="DEAT");
    ix.nais = n?.date || ""; ix.dec = d?.date || "";
    ix.anNais = annee(ix.nais); ix.anDec = annee(ix.dec);
    return ix;
  },
  indexerFam(r){
    const f = { id:r.xref, rec:r, mari:"", femme:"", enfants:[], mar:"", marLieu:"" };
    for(const b of blocs(r)){
      if(b.tag==="HUSB") f.mari = b.val;
      else if(b.tag==="WIFE") f.femme = b.val;
      else if(b.tag==="CHIL") f.enfants.push(b.val);
      else if(b.tag==="MARR"){ f.mar = sousVal(r,b.debut,b.fin,"DATE"); f.marLieu = sousVal(r,b.debut,b.fin,"PLAC"); }
    }
    return f;
  },
  nom(id){ const p = this.indis.get(id); return p ? `${p.givn} ${p.surn}`.trim() || "(sans nom)" : "?"; }
};
function nomHtml(id, centre){
  const p = M.indis.get(id); if(!p) return "?";
  const vie = [p.anNais, p.anDec].some(a=>a) ? ` <small class="mono">${p.anNais ?? "?"}–${p.anDec ?? ""}</small>` : "";
  return `<a class="lienPers" data-fiche="${esc(id)}">${esc(p.givn)} <b>${esc(p.surn)}</b></a>${vie}`;
}
function parentsDe(id){
  const p = M.indis.get(id); if(!p) return [];
  const res = [];
  for(const fid of p.famc){
    const f = M.fams.get(fid); if(!f) continue;
    if(f.mari) res.push(f.mari);
    if(f.femme) res.push(f.femme);
  }
  return res;
}

/* ---------- Persistance IndexedDB (multi-projets) ---------- */
const BD = {
  bd: null,
  ouvrir(){
    return new Promise((res, rej) => {
      const rq = indexedDB.open("koseki", 1);
      rq.onupgradeneeded = e => e.target.result.createObjectStore("projets", { keyPath: "id" });
      rq.onsuccess = e => { this.bd = e.target.result; res(); };
      rq.onerror = () => rej(rq.error);
    });
  },
  tx(mode){ return this.bd.transaction("projets", mode).objectStore("projets"); },
  tous(){ return new Promise(r => { const q = this.tx("readonly").getAll(); q.onsuccess = () => r(q.result); }); },
  lire(id){ return new Promise(r => { const q = this.tx("readonly").get(id); q.onsuccess = () => r(q.result); }); },
  ecrire(p){ return new Promise(r => { const q = this.tx("readwrite").put(p); q.onsuccess = () => r(); }); },
  suppr(id){ return new Promise(r => { const q = this.tx("readwrite").delete(id); q.onsuccess = () => r(); }); }
};

/* ---------- État applicatif ---------- */
const E = {
  projet: null,           // {id, nom, gedcom, maj}
  ficheId: null,          // personne affichée
  racineArbre: null, genArbre: 5,
  racineDesc: null,
  sauvegardePrevue: null
};
function marquerModifie(){
  $("#etatSauvegarde").textContent = "Modifications…";
  clearTimeout(E.sauvegardePrevue);
  E.sauvegardePrevue = setTimeout(sauvegarder, 700);
}
async function sauvegarder(){
  if(!E.projet) return;
  E.projet.gedcom = serialiserGedcom(M.enregs);
  E.projet.maj = Date.now();
  await BD.ecrire(E.projet);
  $("#etatSauvegarde").textContent = "Enregistré " + new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
}

/* ---------- Édition du modèle (préserve les balises inconnues) ---------- */
function prochainId(prefixe){
  let max = 0;
  for(const r of M.enregs){
    const m = new RegExp(`^@${prefixe}(\\d+)@$`).exec(r.xref || "");
    if(m) max = Math.max(max, +m[1]);
  }
  return `@${prefixe}${max + 1}@`;
}
function insererEnreg(rec){
  const i = M.enregs.findIndex(r => r.tag === "TRLR");
  if(i >= 0) M.enregs.splice(i, 0, rec); else M.enregs.push(rec);
}
function poserLigne1(rec, tag, val){ // met à jour ou insère une ligne de niveau 1 simple
  const bs = blocs(rec);
  const b = bs.find(x => x.tag === tag);
  if(b){
    if(val === "" && (tag==="SEX")) rec.lignes.splice(b.debut, b.fin - b.debut);
    else rec.lignes[b.debut].val = val;
  } else if(val !== ""){
    rec.lignes.push({ niv:1, tag, val });
  }
}
function poserNom(rec, givn, surn){
  const bs = blocs(rec); const b = bs.find(x => x.tag === "NAME");
  const valeur = `${givn} /${surn}/`.trim();
  if(b){
    rec.lignes[b.debut].val = valeur;
    // met à jour GIVN/SURN si présents (sinon on n'en crée pas : NAME suffit)
    for(let i = b.debut+1; i < b.fin; i++){
      if(rec.lignes[i].tag === "GIVN") rec.lignes[i].val = givn;
      if(rec.lignes[i].tag === "SURN") rec.lignes[i].val = surn;
    }
  } else {
    rec.lignes.unshift({ niv:1, tag:"NAME", val: valeur });
  }
}
function poserEvt(rec, b, tag, date, lieu, valeur){
  if(b){ // édition : remplace DATE/PLAC/valeur, conserve le reste (sources, notes…)
    rec.lignes[b.debut].tag = tag;
    rec.lignes[b.debut].val = valeur || (tag==="DEAT"||tag==="BIRT" ? rec.lignes[b.debut].val : "");
    let posDate = -1, posLieu = -1;
    for(let i = b.debut+1; i < b.fin; i++){
      if(rec.lignes[i].niv === 2 && rec.lignes[i].tag === "DATE") posDate = i;
      if(rec.lignes[i].niv === 2 && rec.lignes[i].tag === "PLAC") posLieu = i;
    }
    const maj = (pos, t, v) => {
      if(pos >= 0){ if(v) rec.lignes[pos].val = v; else rec.lignes.splice(pos,1); }
      else if(v) rec.lignes.splice(b.debut+1, 0, { niv:2, tag:t, val:v });
    };
    maj(posLieu, "PLAC", lieu); // lieu d'abord : l'insertion de DATE ne décale pas posLieu
    maj(posDate, "DATE", date);
  } else {
    const nl = [{ niv:1, tag, val: valeur || (tag==="DEAT" ? "Y" : "") }];
    if(date) nl.push({ niv:2, tag:"DATE", val:date });
    if(lieu) nl.push({ niv:2, tag:"PLAC", val:lieu });
    rec.lignes.push(...nl);
  }
}
function supprimerBloc(rec, b){ rec.lignes.splice(b.debut, b.fin - b.debut); }

function creerPersonne(givn, surn, sexe){
  const rec = { xref: prochainId("I"), tag: "INDI", lignes: [] };
  poserNom(rec, givn, surn);
  if(sexe && sexe !== "U") rec.lignes.push({ niv:1, tag:"SEX", val:sexe });
  insererEnreg(rec);
  M.reconstruire();
  return rec.xref;
}
function creerFamille(mari, femme){
  const rec = { xref: prochainId("F"), tag: "FAM", lignes: [] };
  if(mari) rec.lignes.push({ niv:1, tag:"HUSB", val:mari });
  if(femme) rec.lignes.push({ niv:1, tag:"WIFE", val:femme });
  insererEnreg(rec);
  if(mari) M.indis.get(mari)?.rec.lignes.push({ niv:1, tag:"FAMS", val:rec.xref });
  if(femme) M.indis.get(femme)?.rec.lignes.push({ niv:1, tag:"FAMS", val:rec.xref });
  M.reconstruire();
  return rec.xref;
}
function ajouterEnfant(fid, pid){
  const f = M.fams.get(fid); if(!f) return;
  f.rec.lignes.push({ niv:1, tag:"CHIL", val:pid });
  M.indis.get(pid)?.rec.lignes.push({ niv:1, tag:"FAMC", val:fid });
  M.reconstruire();
}

<script>
"use strict";
/* =====================================================================
   Gestes tactiles et souris partagés : pincer, glisser, molette, double-tap
   S'applique à tout SVG piloté par un viewBox { vb:[x,y,w,h] }
   ===================================================================== */
function activerGestes(svg, etat, opts){
  opts = opts || {};
  const min = opts.min || 0.4, max = opts.max || 1e6;
  const pendant = opts.pendant || (()=>{});      // appelé à chaque geste (léger)
  const apres   = opts.apres   || (()=>{});      // appelé à la fin (rendu complet)
  const pointeurs = new Map();
  let base = null, aBouge = false, finTimer = null;

  const rect = () => svg.getBoundingClientRect();
  const majVB = () => { const v=etat.vb; svg.setAttribute("viewBox", `${v[0]} ${v[1]} ${v[2]} ${v[3]}`); pendant(); };
  // le clic natif survient juste après pointerup, donc bien avant ce délai :
  // on peut réarmer le drapeau ensuite sans avaler l'appui simple
  const planifierFin = () => { clearTimeout(finTimer); finTimer = setTimeout(() => { apres(); aBouge = false; }, 90); };

  function zoomVers(fx, fy, k){                  // fx,fy = point fixe en fraction de l'écran
    const [x,y,w,h] = etat.vb;
    let nw = w*k;
    nw = Math.min(max, Math.max(min, nw));
    const nh = nw*h/w;
    etat.vb = [x + (w-nw)*fx, y + (h-nh)*fy, nw, nh];
    majVB(); planifierFin();
  }

  svg.addEventListener("wheel", e => {
    e.preventDefault();
    const r = rect();
    zoomVers((e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height, e.deltaY>0 ? 1.18 : 1/1.18);
  }, {passive:false});

  svg.addEventListener("pointerdown", e => {
    pointeurs.set(e.pointerId, {x:e.clientX, y:e.clientY});
    svg.setPointerCapture(e.pointerId);
    aBouge = false;
    base = instantane();
  });
  function instantane(){
    const pts = [...pointeurs.values()];
    const c = pts.reduce((a,p)=>({x:a.x+p.x/pts.length, y:a.y+p.y/pts.length}), {x:0,y:0});
    const d = pts.length>1 ? Math.hypot(pts[0].x-pts[1].x, pts[0].y-pts[1].y) : 0;
    return {c, d, vb:[...etat.vb], n:pts.length};
  }
  svg.addEventListener("pointermove", e => {
    if(!pointeurs.has(e.pointerId)) return;
    pointeurs.set(e.pointerId, {x:e.clientX, y:e.clientY});
    if(!base) return;
    const now = instantane(), r = rect();
    if(now.n !== base.n){ base = instantane(); return; }   // un doigt ajouté ou retiré
    if(Math.hypot(now.c.x-base.c.x, now.c.y-base.c.y) > 5) aBouge = true;

    let [x,y,w,h] = base.vb;
    if(base.n >= 2 && base.d > 0){                          // pincer : zoom + translation
      let k = base.d / now.d;
      let nw = Math.min(max, Math.max(min, w*k));
      const nh = nw*h/w;
      const fx = (base.c.x - r.left)/r.width, fy = (base.c.y - r.top)/r.height;
      x += (w-nw)*fx; y += (h-nh)*fy; w = nw; h = nh;
      if(now.d !== base.d) aBouge = true;
    }
    const dx = (now.c.x - base.c.x)/r.width * w, dy = (now.c.y - base.c.y)/r.height * h;
    etat.vb = [x - dx, y - dy, w, h];
    majVB();
  });
  const relacher = e => {
    pointeurs.delete(e.pointerId);
    base = pointeurs.size ? instantane() : null;
    if(!pointeurs.size) planifierFin();
  };
  svg.addEventListener("pointerup", relacher);
  svg.addEventListener("pointercancel", relacher);
  svg.addEventListener("dblclick", e => {
    e.preventDefault();
    const r = rect();
    zoomVers((e.clientX-r.left)/r.width, (e.clientY-r.top)/r.height, 1/1.9);
  });
  svg.aBougeRecemment = () => aBouge;
  return { zoomVers, aBouge: () => aBouge };
}

  const nH = ps.filter(p=>p.sexe==="M").length, nF = ps.filter(p=>p.sexe==="F").length;
  const nNais = ps.filter(p=>p.anNais).length;
  const longevites = ps.filter(p=>p.anNais && p.anDec && p.anDec>=p.anNais && p.anDec-p.anNais<115).map(p=>p.anDec-p.anNais);
  const longMoy = longevites.length ? Math.round(longevites.reduce((a,b)=>a+b,0)/longevites.length) : null;
  const annees = ps.map(p=>p.anNais).filter(Boolean);
  const minA = Math.min(...annees), maxA = Math.max(...annees);

  // histogramme par demi-siècle
  const pas = 50, colonnes = [];
  if(annees.length){
    const d0 = Math.floor(minA/pas)*pas;
    for(let a = d0; a <= maxA; a += pas){
      colonnes.push({ deb:a, n: annees.filter(x => x>=a && x<a+pas).length });
    }
  }
  const maxN = Math.max(1, ...colonnes.map(c=>c.n));
  const histo = colonnes.map(c =>
    `<div class="col"><span class="val">${c.n||""}</span><div class="b${c.n===maxN?" acc":""}" style="height:${Math.round(c.n/maxN*88)}px"></div><span class="lab">${c.deb}</span></div>`).join("");

  const topPatro = compter(ps.map(p=>p.surn).filter(Boolean)).slice(0,8);
  const topLieux = compter(ps.flatMap(p=>p.evts.map(e=>e.lieu).filter(Boolean)).map(l=>{
    const seg = l.split(",").map(s=>s.trim());
    return seg.length > 1 && /^\d/.test(seg[0]) === false ? seg[0] : seg.find(s=>!/^\d/.test(s)) || seg[0];
  })).slice(0,8);

  </div>

    <div class="carte"><h2>Patronymes les plus portés</h2><ul class="listeTop">
      ${topPatro.map(([n,c])=>`<li><span>${esc(n)}</span><b>${c}</b></li>`).join("")}</ul></div>
    <div class="carte"><h2>Communes les plus citées</h2><ul class="listeTop">
      ${topLieux.map(([n,c])=>`<li><span>${esc(n)}</span><b>${c}</b></li>`).join("")}</ul></div>
  </div>
  <div class="carte">
    <h2>Repères</h2>
    <p>Personne la plus ancienne du registre : ${plusAncien ? nomHtml(plusAncien.id) : "—"}.
    ${anomalies ? `<br>Le contrôle qualité relève <a class="lienPers" onclick="afficherVue('qualite')">${anomalies} point${anomalies>1?"s":""} à vérifier</a>.` : "<br>Aucune anomalie détectée par le contrôle qualité."}</p>
  </div>`;
}
function compter(arr){
  const c = new Map();
  for(const x of arr) c.set(x, (c.get(x)||0)+1);
  return [...c.entries()].sort((a,b)=>b[1]-a[1]);
}

      </div>

      </div>
      ${freres.size ? `<div class="famBloc"><h3>Fratrie</h3><ul>${[...freres].map(id=>`<li>${nomHtml(id)}</li>`).join("")}</ul></div>` : ""}
    </div>

          <ul>${f.enfants.map(id=>`<li>${nomHtml(id)}</li>`).join("") || "<li class='aide'>Sans enfant enregistré</li>"}</ul>
          <p class="pasImpr" style="margin-top:6px"><button class="btn petit clair" onclick='ouvrirDlgLien("enfant","${esc(p.id)}","${esc(f.id)}")'>+ Ajouter un enfant</button></p>
        </div>`;
      }).join("")}
      <p class="pasImpr"><button class="btn petit clair" onclick='ouvrirDlgLien("conjoint","${esc(p.id)}")'>+ Lier un conjoint / nouvelle union</button></p>
    </div>
  </div>`;
}
function profondeurAscendance(id, vus = new Set()){
  if(vus.has(id)) return 0;
  vus.add(id);
  const ps = parentsDe(id);
  if(!ps.length) return 1;
  return 1 + Math.max(...ps.map(x => profondeurAscendance(x, vus)));
}

<script>

$("#btnEnrPersonne").addEventListener("click", () => {

  } else {

/* Lier parent / conjoint / enfant : personne existante ou nouvelle */
let ctxLien = null;
function ouvrirDlgLien(type, pid, fid){
  ctxLien = { type, pid, fid };
  const titres = { parent:"Lier un parent", conjoint:"Lier un conjoint", enfant:"Ajouter un enfant" };
  $("#dlgLienTitre").textContent = titres[type];
  $("#dlgLienCorps").innerHTML = `
    <label class="champ"><span>Personne existante</span>
      <input id="lQ" placeholder="Tapez un nom pour chercher…" autocomplete="off">
      <div id="lRes" style="max-height:160px;overflow:auto"></div>

      <label class="champ"><span>Nom</span><input id="lSurn"></label>

      <option value="U">Inconnu</option><option value="M">Homme</option><option value="F">Femme</option></select></label>`;
  $("#lQ").addEventListener("input", () => {
    const q = norm($("#lQ").value);
    if(q.length < 2){ $("#lRes").innerHTML = ""; return; }
    const res = [...M.indis.values()].filter(x => norm(x.givn+" "+x.surn).includes(q)).slice(0,12);

$("#btnEnrLien").addEventListener("click", () => {
  let cible = $("#lId").value;
  if(!cible){
    const g = $("#lGivn").value.trim(), s = $("#lSurn").value.trim().toUpperCase();
    if(!g && !s){ toast("Choisissez une personne ou saisissez un nom."); return; }
    cible = creerPersonne(g, s, $("#lSexe").value);
  }
  const { type, pid, fid } = ctxLien;
  const p = M.indis.get(pid), c = M.indis.get(cible);
  if(type === "parent"){
    let f = p.famc.map(x=>M.fams.get(x)).find(Boolean);
    const role = c.sexe === "F" ? "WIFE" : "HUSB";
    if(f){
      const champ = role === "WIFE" ? "femme" : "mari";
      if(f[champ]){ toast("Cette union a déjà un "+(role==="WIFE"?"une mère":"un père")+" — créez une seconde filiation via l'export si besoin."); return; }
      f.rec.lignes.push({ niv:1, tag:role, val:cible });
      c.rec.lignes.push({ niv:1, tag:"FAMS", val:f.id });
    } else {
      const nfid = creerFamille(role==="HUSB"?cible:"", role==="WIFE"?cible:"");
      M.fams.get(nfid).rec.lignes.push({ niv:1, tag:"CHIL", val:pid });
      M.indis.get(pid).rec.lignes.push({ niv:1, tag:"FAMC", val:nfid });

  } else if(type === "conjoint"){
    const h = p.sexe === "F" ? cible : pid, f2 = p.sexe === "F" ? pid : cible;
    creerFamille(h, f2);
  } else if(type === "enfant"){
    ajouterEnfant(fid, cible);
  }
  M.reconstruire(); marquerModifie();

    for(const r of M.enregs){
      if(r.tag !== "FAM" && r.tag !== "INDI") continue;
      r.lignes = r.lignes.filter(l => !(l.niv===1 && ["HUSB","WIFE","CHIL"].includes(l.tag) && l.val === id));

    $("#dlgConfirm").close();
    E.ficheId = null;
    afficherVue("personnes");

  };

}

<script>
"use strict";
/* ---------- Arbre ascendant SVG ---------- */
function vueArbre(){
  const el = $("#vue-arbre");
  if(!E.racineArbre || !M.indis.has(E.racineArbre)){
    E.racineArbre = E.ficheId && M.indis.has(E.ficheId) ? E.ficheId : M.indis.keys().next().value || null;
  }
  if(!E.racineArbre){
    el.innerHTML = `<div class="carte vide"><div class="gros">Registre vide</div>Importez un GEDCOM pour visualiser un arbre.</div>`;
    return;
  }
  el.innerHTML = `
  <h1 class="titreVue">Arbre d'ascendance</h1>
  <p class="sousTitre">Appuyez sur une case pour recentrer l'arbre — double-appui pour ouvrir la fiche. Pincez ou utilisez la molette pour zoomer, glissez pour vous déplacer.</p>
  <div class="carte pasImpr"><div class="rang">
    <span>Racine : <b>${esc(M.nom(E.racineArbre))}</b></span>
    <label>Générations
      <select id="arbGen" style="border:1px solid var(--ligne-forte);border-radius:6px;padding:5px;margin-left:6px">
        ${[3,4,5,6,7].map(g=>`<option${g===E.genArbre?" selected":""}>${g}</option>`).join("")}
      </select></label>
    <button class="btn petit clair" id="btnSvgExport">Télécharger le SVG</button>
    <button class="btn petit clair" onclick="ouvrirFiche(E.racineArbre)">Ouvrir la fiche racine</button>
  </div></div>
  <div id="zoneArbre"></div>`;
  $("#arbGen").addEventListener("change", e => { E.genArbre = +e.target.value; ARBRE.vb = null; dessinerArbre(); });
  $("#btnSvgExport").addEventListener("click", () => {
    const svg = $("#svgArbre");
    const blob = new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n' + svg.outerHTML.replace("<svg ", '<svg xmlns="http://www.w3.org/2000/svg" ')], { type:"image/svg+xml" });
    telecharger(blob, `arbre-${norm(M.nom(E.racineArbre)).replace(/\s+/g,"-")}.svg`);
  });
  dessinerArbre();
}
function dessinerArbre(){
  const G = E.genArbre;
  const BW = 168, BH = 52, GX = 46, PAD = 16;
  const nbFeuilles = 2 ** (G - 1);
  const H = Math.max(nbFeuilles * (BH + 10), 300) + PAD * 2;
  const W = G * BW + (G - 1) * GX + PAD * 2;
  // positions Ahnentafel : sosa 1 = racine ; enfants de sosa n : 2n (père), 2n+1 (mère)
  const cases = []; const posY = {};
  function yPour(sosa, gen){
    const parGen = 2 ** gen;              // nb de positions à cette génération
    const idx = sosa - parGen;            // 0-based dans la génération
    return PAD + (idx + 0.5) * ((H - 2*PAD) / parGen) - BH/2;
  }
  function poser(id, sosa, gen){
    if(gen >= G) return;
    const x = PAD + gen * (BW + GX);
    const y = yPour(sosa, gen);
    posY[sosa] = { x, y, id };
    cases.push({ id, sosa, gen, x, y });
    if(id){
      const [pere, mere] = deuxParents(id);
      poser(pere, sosa*2, gen+1);
      poser(mere, sosa*2+1, gen+1);
    } else if(gen+1 < G){
      poser(null, sosa*2, gen+1);
      poser(null, sosa*2+1, gen+1);
    }
  }
  poser(E.racineArbre, 1, 0);

  let traits = "", boites = "";
  for(const c of cases){
    const parent = posY[Math.floor(c.sosa/2)];
    if(c.sosa > 1 && parent){
      const x1 = parent.x + BW, y1 = parent.y + BH/2, x2 = c.x, y2 = c.y + BH/2;
      const mx = x1 + GX/2;
      traits += `<path class="trait" d="M${x1},${y1} H${mx} V${y2} H${x2}"/>`;
    }
    if(c.id){
      const p = M.indis.get(c.id);
      const vie = `${p.anNais ?? "?"} – ${p.anDec ?? ""}`;
      boites += `<g class="boitePers${c.sosa===1?" centre":""}" data-arbre="${esc(c.id)}" tabindex="0" role="button" aria-label="${esc(M.nom(c.id))}">
        <rect x="${c.x}" y="${c.y}" width="${BW}" height="${BH}" rx="5"/>
        <text class="nomB" x="${c.x+9}" y="${c.y+18}">${esc(tronc(p.givn, 20))}</text>
        <text class="patB" x="${c.x+9}" y="${c.y+32}">${esc(tronc(p.surn, 22))}</text>
        <text class="datB" x="${c.x+9}" y="${c.y+45}">${vie}</text></g>`;
    } else {
      boites += `<g class="boitePers videB"><rect x="${c.x}" y="${c.y}" width="${BW}" height="${BH}" rx="5"/>
        <text x="${c.x+9}" y="${c.y+30}">inconnu·e</text></g>`;
    }
  }
  const zone = $("#zoneArbre");
  const premier = !ARBRE.vb || ARBRE.pourRacine !== E.racineArbre + "|" + G;
  if(premier){ ARBRE.vb = [0, 0, W, H]; ARBRE.pourRacine = E.racineArbre + "|" + G; }
  zone.innerHTML = `<svg id="svgArbre" viewBox="${ARBRE.vb.join(" ")}" preserveAspectRatio="xMidYMid meet">${traits}${boites}</svg>
    <div class="zoomBtns pasImpr">
      <button id="arbPlus" aria-label="Zoomer">+</button>
      <button id="arbMoins" aria-label="Dézoomer">−</button>
      <button id="arbAjuste" class="min" aria-label="Tout afficher">⤢</button>
    </div>`;
  const svg = $("#svgArbre");
  const g = activerGestes(svg, ARBRE, { min: 60, max: W * 6 });
  $("#arbPlus").addEventListener("click", () => g.zoomVers(0.5, 0.5, 1/1.5));

    });
    el.addEventListener("dblclick", ev => { ev.stopPropagation(); ouvrirFiche(el.dataset.arbre); });

}
const ARBRE = { vb:null, pourRacine:null };
function deuxParents(id){
  const p = M.indis.get(id); if(!p) return [null, null];
  for(const fid of p.famc){
    const f = M.fams.get(fid);
    if(f) return [f.mari || null, f.femme || null];
  }
  return [null, null];
}
function tronc(s, n){ return s.length > n ? s.slice(0, n-1) + "…" : s; }

/* ---------- Descendance ---------- */
function vueDescendance(){
  const el = $("#vue-descendance");
  if(!E.racineDesc || !M.indis.has(E.racineDesc)){
    E.racineDesc = E.ficheId && M.indis.has(E.ficheId) ? E.ficheId : null;
  }
  if(!E.racineDesc){
    el.innerHTML = `<div class="carte vide"><div class="gros">Choisissez une personne</div>Ouvrez une fiche puis « Voir sa descendance ».</div>`;
    return;
  }
  const compte = { n: 0 };
  const arbo = descHtml(E.racineDesc, new Set(), compte, 0);
  el.innerHTML = `
  <h1 class="titreVue">Descendance</h1>
  <p class="sousTitre">${compte.n} descendant${compte.n>1?"s":""} de ${esc(M.nom(E.racineDesc))}</p>
  <div class="carte"><ul class="desc">${arbo}</ul></div>`;
}
function descHtml(id, vus, compte, prof){
  if(vus.has(id) || prof > 15) return "";
  vus.add(id);
  const p = M.indis.get(id); if(!p) return "";
  let html = `<li>${nomHtml(id)}`;
  for(const fid of p.fams){
    const f = M.fams.get(fid); if(!f) continue;
    const conj = f.mari === id ? f.femme : f.mari;
    if(conj) html += ` <span class="conjoint">× ${nomHtml(conj)}</span>`;
    if(f.enfants.length){
      html += `<ul>${f.enfants.map(e => { compte.n++; return descHtml(e, vus, compte, prof+1); }).join("")}</ul>`;
    }
  }
  return html + "</li>";
}

/* ---------- Contrôle qualité ---------- */
function controlerQualite(){
  const anomalies = [];
  const push = (id, type, libelle) => anomalies.push({ id, type, libelle });
  for(const p of M.indis.values()){
    if(p.anNais && p.anDec){
      if(p.anDec < p.anNais) push(p.id, "incoherence", "Décès avant la naissance");
      else if(p.anDec - p.anNais > 110) push(p.id, "incoherence", `Longévité improbable (${p.anDec - p.anNais} ans)`);
    }
    if(!p.givn && !p.surn) push(p.id, "manque", "Personne sans nom");
    if(p.sexe === "U") push(p.id, "manque", "Sexe non renseigné");
    // cohérence avec les parents
    if(p.anNais){
      for(const [par, role] of [[deuxParents(p.id)[0], "père"], [deuxParents(p.id)[1], "mère"]]){
        if(!par) continue;
        const pp = M.indis.get(par); if(!pp?.anNais) continue;
        const ecart = p.anNais - pp.anNais;
        if(ecart < 13) push(p.id, "incoherence", `${role === "père" ? "Père" : "Mère"} âgé·e de ${ecart} an${ecart>1?"s":""} à la naissance`);
        if(role === "mère" && ecart > 55) push(p.id, "incoherence", `Mère âgée de ${ecart} ans à la naissance`);
        if(role === "père" && ecart > 75) push(p.id, "incoherence", `Père âgé de ${ecart} ans à la naissance`);
        if(pp.anDec && p.anNais > pp.anDec + (role === "père" ? 1 : 0)) push(p.id, "incoherence", `Né·e après le décès de ${role === "père" ? "son père" : "sa mère"}`);
      }
    }
  }
  // doublons potentiels : même nom normalisé + années de naissance proches
  const parCle = new Map();
  for(const p of M.indis.values()){
    if(!p.surn || !p.givn) continue;
    const cle = norm(p.surn) + "|" + norm(p.givn.split(" ")[0]);
    if(!parCle.has(cle)) parCle.set(cle, []);
    parCle.get(cle).push(p);
  }
  for(const groupe of parCle.values()){
    for(let i = 0; i < groupe.length; i++)
      for(let j = i+1; j < groupe.length; j++){
        const a = groupe[i], b = groupe[j];
        if(a.anNais && b.anNais && Math.abs(a.anNais - b.anNais) <= 2)
          anomalies.push({ id:a.id, id2:b.id, type:"doublon", libelle:`Doublon possible avec ${M.nom(b.id)} (${b.anNais})` });
      }
  }
  return anomalies;
}
function vueQualite(){
  const el = $("#vue-qualite");
  const anomalies = controlerQualite();
  const parType = { incoherence:[], manque:[], doublon:[] };
  for(const a of anomalies) parType[a.type].push(a);
  const section = (titre, liste, badge) => liste.length ? `
    <div class="carte"><h2>${titre} <span class="badge ${badge}">${liste.length}</span></h2>
    <table class="reg"><tbody>${liste.slice(0,300).map(a => `
      <tr class="clic" data-fiche="${esc(a.id)}"><td>${esc(M.nom(a.id))}</td><td>${esc(a.libelle)}</td></tr>`).join("")}
    </tbody></table>${liste.length>300?`<p class="aide">${liste.length} au total — 300 premiers affichés.</p>`:""}</div>` : "";
  el.innerHTML = `
  <h1 class="titreVue">Contrôle qualité</h1>
  <p class="sousTitre">Vérifications automatiques : cohérence des dates, complétude, doublons. Cliquez pour ouvrir la fiche.</p>
  ${anomalies.length === 0 ? `<div class="carte vide"><div class="gros">Rien à signaler</div>Le registre passe tous les contrôles.</div>` :
    section("Incohérences chronologiques", parType.incoherence, "warn") +
    section("Doublons possibles", parType.doublon, "warn") +
    section("Données manquantes", parType.manque, "")}`;
}
</script>

/* Lecture et décodage tolérant des fichiers GEDCOM (UTF-8, sinon Windows-1252) */
function decoderGed(buf){
  let txt = new TextDecoder("utf-8").decode(buf);
  const abimes = (txt.match(/\uFFFD/g) || []).length;
  if(abimes > txt.length / 2000){                      // trop de caractères illisibles : autre encodage
    try { txt = new TextDecoder("windows-1252").decode(buf); } catch(e){}
  }
  return txt;
}
async function lireFichierTexte(f){ return decoderGed(await f.arrayBuffer()); }
function importerGed(texte, nom){
  const enregs = parseGedcom(texte);
  const nb = enregs.filter(r => r.tag === "INDI").length;
  if(!nb){
    toast(/0\s+HEAD/.test(texte) ? "Fichier GEDCOM sans individu." : "Ce fichier ne ressemble pas à un GEDCOM.");
    return;
  }
  M.enregs = enregs; M.reconstruire();
  E.ficheId = null; E.racineArbre = null; E.racineDesc = null;
  if(E.projet && nom && /^(Mon arbre|Nouvel arbre)$/.test(E.projet.nom)){
    E.projet.nom = nom.replace(/\.(ged|gedcom|txt)$/i, "") || E.projet.nom;
    majSelecteurProjets();
  }
  marquerModifie();
  toast(`${nb.toLocaleString("fr-FR")} personnes importées`);
  afficherVue("tableau");
}
function nomFichier(s){ return norm(s).replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "registre"; }
function telecharger(blob, nom){
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = nom;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
}

async function creerProjet(nom){
  const p = { id: crypto.randomUUID(), nom, gedcom: "\uFEFF0 HEAD\r\n1 GEDC\r\n2 VERS 5.5.1\r\n2 FORM LINEAGE-LINKED\r\n1 CHAR UTF-8\r\n1 SOUR KOSEKI\r\n0 TRLR\r\n", maj: Date.now() };
  await BD.ecrire(p);
  await chargerProjet(p.id);
}
async function chargerProjet(id){
  const p = await BD.lire(id);

}
async function majSelecteurProjets(){
  const tous = (await BD.tous()).sort((a,b)=>b.maj-a.maj);

    `<option value="${p.id}"${p.id===E.projet?.id?" selected":""}>${esc(p.nom)}</option>`).join("");
}

/* ---------- Recherche globale ---------- */
$("#rechGlobale").addEventListener("input", () => {

$$("nav.onglets button").forEach(b => b.addEventListener("click", () => afficherVue(b.dataset.vue)));
$$("dialog [data-fermer]").forEach(b => b.addEventListener("click", () => b.closest("dialog").close()));

$("#btnNouvProjet").addEventListener("click", async () => {
  const nom = prompt("Nom du nouveau projet :", "Nouvel arbre");
  if(nom) await creerProjet(nom.trim());
});

/* Safari iOS ignore user-scalable=no : on neutralise ses gestes de zoom de page.
   Le zoom reste possible dans l'arbre et la carte, qui le gèrent eux-mêmes. */
["gesturestart","gesturechange","gestureend"].forEach(ev =>
  document.addEventListener(ev, e => e.preventDefault(), {passive:false}));
let dernierAppui = 0;
document.addEventListener("touchend", e => {
  const t = Date.now();
  if(t - dernierAppui < 320 && !e.target.closest("#svgCarte,#svgArbre")) e.preventDefault();
  dernierAppui = t;
}, {passive:false});

(async function demarrer(){
  await BD.ouvrir();
  const tous = await BD.tous();
  if(!tous.length){
    await creerProjet("Mon arbre");
  } else {
    const dernier = localStorage.getItem("koseki-dernier-projet");
    await chargerProjet(tous.some(p=>p.id===dernier) ? dernier : tous.sort((a,b)=>b.maj-a.maj)[0].id);
  }
})();

const COMMUNES_PACK=document.getElementById("dataCommunes").textContent;
/* =====================================================================
   Koseki — Carte des migrations
   Géocodage hors-ligne + carte SVG interactive (projection Mercator)
   ===================================================================== */
const B36="0123456789abcdefghijklmnopqrstuvwxyz";
function d36(s){ let neg=s[0]==="-"; if(neg) s=s.slice(1); let n=0; for(const c of s) n=n*36+B36.indexOf(c); return neg?-n:n; }

let COMMUNES=null;                    // Map nom -> [[dep,lat,lon],…] (dépliée à la demande)
function chargerCommunes(){
  if(COMMUNES) return COMMUNES;
  COMMUNES=new Map(); let prev="";
  for(const l of COMMUNES_PACK.split("\n")){
    if(!l) continue;
    const p=l.split("|"), k=B36.indexOf(p[0][0]), nom=prev.slice(0,k)+p[0].slice(1); prev=nom;
    const e=[p[1], d36(p[2])/100, d36(p[3])/100];
    const a=COMMUNES.get(nom); if(a) a.push(e); else COMMUNES.set(nom,[e]);
  }
  return COMMUNES;
}
const DEPN=(()=>{ const m={}; for(const [c,v] of Object.entries(GZ.dep)) m[norm(v.n).toUpperCase()]=c; return m; })();
const nrm = s => norm(s).toUpperCase().replace(/[^A-Z0-9]+/g," ").trim();
const varianteSt = s => s.replace(/\bSAINTE\b/g,"STE").replace(/\bSAINT\b/g,"ST");

/* Géocode une chaîne PLAC -> {lat,lon,prec} */
function geocoder(plac){
  const C=chargerCommunes();
  const segs=plac.split(",").map(s=>s.trim()).filter(Boolean);
  if(!segs.length) return null;
  const pays=nrm(segs[segs.length-1]);
  let dep=null; const noms=[];
  const poseDep = code => { if(dep) return; dep = /^9[78]/.test(code) ? code.slice(0,3) : code.slice(0,2); };
  for(const s of segs){
    let n=nrm(s);
    let m=/^(\d{5})\s+(.+)$/.exec(s.trim());        // "89520 Sougères-en-Puisaye"
    if(m){ poseDep(m[1]); noms.push(nrm(m[2])); continue; }
    m=/^(.+?)\s+(\d{2,3})$/.exec(s.trim());          // "La Maison Dieu 58"
    if(m && (GZ.dep[m[2]] || GZ.dep[m[2].padStart(2,"0")])){ poseDep(m[2].padStart(2,"0")); noms.push(nrm(m[1])); continue; }
    if(/^\d{5}$/.test(n)){ poseDep(n); continue; }
    if(/^\d{1,4}$/.test(n)) continue;
    if(DEPN[n]){ if(!dep) dep=DEPN[n]; continue; }
    noms.push(n);
  }
  if(pays==="FRANCE" || !GZ.pays[pays]){
    for(const n0 of noms){
      for(const n of [n0, varianteSt(n0), n0.replace(/^(LA|LE|LES|L) /,"")]){
        const c=C.get(n); if(!c) continue;
        if(dep){ const e=c.find(x=>x[0]===dep); if(e) return {lat:e[1],lon:e[2],prec:"commune"}; }
        else if(c.length===1) return {lat:c[0][1],lon:c[0][2],prec:"commune"};
      }
    }
    if(dep && GZ.dep[dep]) return {lat:GZ.dep[dep].lat,lon:GZ.dep[dep].lon,prec:"departement"};
    for(const n of noms) if(GZ.reg[n]) return {lat:GZ.reg[n].lat,lon:GZ.reg[n].lon,prec:"region"};
  }
  if(GZ.pays[pays]) return {lat:GZ.pays[pays].lat,lon:GZ.pays[pays].lon,prec:"pays"};
  return null;
}

/* Index des lieux du projet (avec corrections manuelles persistées) */
const LIEUX={ table:new Map(), manuels:{} };
function indexerLieux(){
  LIEUX.table.clear();
  LIEUX.manuels = (E.projet && E.projet.lieux) || {};
  for(const p of M.indis.values())
    for(const e of p.evts) if(e.lieu) compterLieu(e.lieu);
  for(const f of M.fams.values()) if(f.marLieu) compterLieu(f.marLieu);
  return LIEUX.table;
}
function compterLieu(plac){
  let L=LIEUX.table.get(plac);
  if(!L){
    const man=LIEUX.manuels[plac];
    const g = man ? {lat:man.lat, lon:man.lon, prec:"manuel"} : geocoder(plac);
    L={ plac, n:0, ...(g||{lat:null,lon:null,prec:"inconnu"}) };
    LIEUX.table.set(plac,L);
  }
  L.n++;
}
function coordDe(plac){
  if(!plac) return null;
  const L=LIEUX.table.get(plac);
  return (L && L.lat!=null) ? L : null;
}

/* Mouvements : filiation (naissance parent -> naissance enfant) et vie (naissance -> décès) */
function calculerMouvements(){
  const mv=[];
  const lieuNais = p => p.evts.find(e=>e.tag==="BIRT" && e.lieu)?.lieu || p.evts.find(e=>e.tag==="CHR" && e.lieu)?.lieu;
  const lieuDec  = p => p.evts.find(e=>(e.tag==="DEAT"||e.tag==="BURI") && e.lieu)?.lieu;
  // fenêtre de vie : sert au mode « vivants à cette date ».
  // Sans date de décès connue, on suppose une vie de 85 ans au plus.
  const vie = p => {
    const n = p.anNais ?? (p.anDec ? p.anDec - 60 : null);
    const f = p.anDec ?? (n != null ? n + 85 : null);
    return [n, f];
  };
  for(const p of M.indis.values()){
    const ln=lieuNais(p), ld=lieuDec(p);
    const [vn, vf] = vie(p);
    if(ln && ld && ln!==ld){
      const a=coordDe(ln), b=coordDe(ld);
      if(a&&b) mv.push({type:"vie", de:ln, vers:ld, a, b, an:p.anNais||p.anDec, qui:p.id, vn, vf});
    }
    if(ln){
      for(const par of deuxParents(p.id)){
        if(!par) continue;
        const pp=M.indis.get(par); if(!pp) continue;
        const lp=lieuNais(pp); if(!lp || lp===ln) continue;
        const a=coordDe(lp), b=coordDe(ln);
        if(a&&b) mv.push({type:"filiation", de:lp, vers:ln, a, b, an:p.anNais||pp.anNais, qui:p.id, vn, vf});
      }
    }
  }
  return mv;
}
function distanceKm(a,b){
  const R=6371, r=Math.PI/180;
  const dLat=(b.lat-a.lat)*r, dLon=(b.lon-a.lon)*r;
  const h=Math.sin(dLat/2)**2 + Math.cos(a.lat*r)*Math.cos(b.lat*r)*Math.sin(dLon/2)**2;
  return Math.round(2*R*Math.asin(Math.sqrt(h)));
}

/* Projection Mercator vers un espace fixe 1000 x ~1000 */
const PROJ={ W:1000 };
function projeter(lat,lon){
  const x=(lon+180)/360*PROJ.W;
  const f=Math.max(-85,Math.min(85,lat))*Math.PI/180;
  const y=(1 - Math.log(Math.tan(f)+1/Math.cos(f))/Math.PI)/2*PROJ.W;
  return [x,y];
}

function cadrer(lat1,lon1,lat2,lon2){
  const a=projeter(lat2,lon1), b=projeter(lat1,lon2);
  const w=Math.max(2,b[0]-a[0]), h=Math.max(2,b[1]-a[1]);
  CARTE.vb=[a[0]-w*0.05, a[1]-h*0.05, w*1.1, h*1.1];
}
function ajusterVue(loc){
  if(!loc.length){ cadrer(41.3,-5.2,51.1,9.6); return; }
  // on ignore les 6 % de lieux les plus excentrés pour ne pas réduire le cœur de la lignée
  const q=(arr,f)=>{ const a=[...arr].sort((x,y)=>x-y); return a[Math.min(a.length-1, Math.max(0, Math.round((a.length-1)*f)))]; };
  const lats=loc.map(l=>l.lat), lons=loc.map(l=>l.lon);
  let la1=q(lats,0.03), la2=q(lats,0.97), lo1=q(lons,0.03), lo2=q(lons,0.97);
  if(la2-la1 < 1.2){ const c=(la1+la2)/2; la1=c-0.9; la2=c+0.9; }
  if(lo2-lo1 < 1.2){ const c=(lo1+lo2)/2; lo1=c-0.9; lo2=c+0.9; }
  const mLat=(la2-la1)*0.12+0.35, mLon=(lo2-lo1)*0.12+0.35;
  cadrer(la1-mLat, lo1-mLon, la2+mLat, lo2+mLon);
}

/* Rendu SVG */
/* Rendu SVG en trois couches : fond (rare), arcs (temps), points (temps + zoom) */
function dessinerCarte(quoi){
  const svg=$("#svgCarte"); if(!svg) return;
  quoi = quoi || "tout";
  const [vx,vy,vw,vh]=CARTE.vb;
  svg.setAttribute("viewBox",`${vx} ${vy} ${vw} ${vh}`);
  if(quoi==="vue") return;                       // simple déplacement : le viewBox suffit
  const ech=vw/PROJ.W;
  const gF=$("#cFond"), gA=$("#cArcs"), gP=$("#cPts");
  if(!gF) return;

  // --- fond : reconstruit seulement si le niveau de détail change ---
  const detail = ech<0.14 ? "dep" : "monde";
  if(quoi==="tout" || CARTE.detail!==detail){
    CARTE.detail=detail;
    const poly=(pl,fill,stroke,sw)=>{
      let d="";
      for(const ring of pl) d+="M"+ring.map(([lo,la])=>projeter(la,lo).map(v=>v.toFixed(1)).join(",")).join("L")+"Z";
      return `<path d="${d}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>`;
    };
    let fond="";
    for(const f of MONDE) fond+=poly(f.p,"#E3DCCB","#C9BFA6",1);
    if(detail==="dep") for(const f of DEPS) fond+=poly(f.p,"none","#CFC4AA",0.7);
    gF.innerHTML=fond;
  }

  // --- arcs : dépendent du temps et des filtres ---
  if(quoi==="tout" || quoi==="temps"){
    const mv=CARTE.mv.filter(m=>{
      if(!CARTE.filtre[m.type] || !m.an || m.an>CARTE.an) return false;
      if(CARTE.mode==="vivants"){                       // ne garder que les personnes vivantes à cette date
        if(m.vn==null || m.vf==null) return false;
        return m.vn<=CARTE.an && CARTE.an<=m.vf;
      }
      return true;
    });
    const agg=new Map();
    for(const m of mv){
      const k=m.type+"|"+m.de+"|"+m.vers;
      const a=agg.get(k); if(a){ a.n++; a.an=Math.max(a.an,m.an); } else agg.set(k,{...m,n:1});
    }
    let arcs="";
    for(const m of agg.values()){
      const [x1,y1]=projeter(m.a.lat,m.a.lon), [x2,y2]=projeter(m.b.lat,m.b.lon);
      const dx=x2-x1, dy=y2-y1;
      const cx=(x1+x2)/2 - dy*0.16, cy=(y1+y2)/2 + dx*0.16;
      const recent = CARTE.jouer && (CARTE.an-m.an)<=18;
      const col = recent ? "#D4A017" : (m.type==="filiation" ? "#9E2B33" : "#33506E");
      const op  = recent ? 0.98 : Math.min(0.85, 0.34+m.n*0.07);
      const w   = (recent ? 2.6 : 1) * Math.min(3.6, 1.05+m.n*0.26);
      arcs+=`<path d="M${x1.toFixed(1)},${y1.toFixed(1)}Q${cx.toFixed(1)},${cy.toFixed(1)} ${x2.toFixed(1)},${y2.toFixed(1)}"
        fill="none" stroke="${col}" stroke-width="${w.toFixed(2)}" opacity="${op}" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`;
    }
    gA.innerHTML=arcs;
    CARTE.nbArcs=agg.size; CARTE.nbMv=mv.length;
  }

  // --- points : ne dépendent plus que du temps (leur taille écran est fixe) ---
  if(quoi==="tout" || quoi==="temps"){
    const cpt=new Map();
    if(CARTE.mode==="vivants"){
      for(const m of CARTE.mv){                          // lieux fréquentés par les vivants du moment
        if(m.vn==null || m.vf==null) continue;
        if(m.vn>CARTE.an || CARTE.an>m.vf) continue;
        cpt.set(m.de,(cpt.get(m.de)||0)+1);
        cpt.set(m.vers,(cpt.get(m.vers)||0)+1);
      }
    } else {
      for(const ev of CARTE.evts){
        if(ev.an && ev.an>CARTE.an) continue;
        cpt.set(ev.lieu,(cpt.get(ev.lieu)||0)+1);
      }
    }
    const maxN=Math.max(1,...cpt.values());
    // Un point = un chemin de longueur nulle à bout rond dont l'épaisseur ne suit pas le zoom :
    // taille écran constante, position ancrée sur la carte, aucun recalcul au zoom.
    // Les points de diamètre voisin sont réunis dans un seul chemin : quelques dizaines
    // d'éléments au lieu d'un millier, ce qui garde l'animation fluide.
    const paquets=new Map();          // diamètre arrondi -> {pleins:[], halos:[]}
    CARTE.etiq=[]; let selD=null;
    for(const [plac,n] of cpt){
      const L=coordDe(plac); if(!L) continue;
      const [x,y]=projeter(L.lat,L.lon);
      const seg="M"+x.toFixed(2)+","+y.toFixed(2)+"L"+x.toFixed(2)+","+y.toFixed(2);
      const D=Math.round((5.5+Math.sqrt(n/maxN)*13)*2)/2;      // diamètre écran, par pas de 0,5 px
      CARTE.etiq.push({plac, x, y, n, D});
      if(CARTE.sel===plac){ selD={seg, D}; continue; }
      let q=paquets.get(D); if(!q){ q={pleins:[], halos:[]}; paquets.set(D,q); }
      q.pleins.push(seg);
      if(L.prec!=="commune" && L.prec!=="manuel") q.halos.push(seg);
    }
    let pts="";
    const chemin=(d,col,w,op)=>`<path d="${d}" stroke="${col}" stroke-width="${w}" ${op?`stroke-opacity="${op}" `:""}stroke-linecap="round" fill="none" vector-effect="non-scaling-stroke"/>`;
    for(const [D,q] of paquets) if(q.halos.length) pts+=chemin(q.halos.join(""), "#7E2B24", (D*2.1).toFixed(1), 0.20);
    for(const [D,q] of paquets) pts+=chemin(q.pleins.join(""), "#7E2B24", (D+2.6).toFixed(1));
    for(const [D,q] of paquets) pts+=chemin(q.pleins.join(""), "#F6F0E3", D.toFixed(1));
    if(selD) pts+=chemin(selD.seg,"#7E2B24",(selD.D+3.4).toFixed(1))+chemin(selD.seg,"#D4A017",(selD.D+1).toFixed(1));
    gP.innerHTML=pts;
  }
  majEtiquettes();
  majInfo(CARTE.nbArcs||0, CARTE.nbMv||0);
}
/* Étiquettes des villes : surcouche HTML, repositionnée à chaque changement de vue.
   Taille de texte constante, jamais de saut, et anti-chevauchement. */
function majEtiquettes(){
  const cap=$("#capCarte"), svg=$("#svgCarte");
  if(!cap || !svg || !CARTE.etiq) return;
  const r=svg.getBoundingClientRect();
  if(!r.width) return;
  const [vx,vy,vw,vh]=CARTE.vb;
  const kx=r.width/vw, ky=r.height/vh;
  // plus on zoome, plus on peut nommer de lieux sans surcharger
  const ech=vw/PROJ.W;
  const maxEtiq = ech>0.5 ? 0 : ech>0.18 ? 10 : ech>0.06 ? 22 : ech>0.02 ? 40 : 70;
  if(!maxEtiq){ cap.innerHTML=""; return; }

  const cands=CARTE.etiq
    .map(e=>({...e, sx:(e.x-vx)*kx, sy:(e.y-vy)*ky}))
    .filter(e=>e.sx>-40 && e.sx<r.width+40 && e.sy>-20 && e.sy<r.height+20)
    .sort((a,b)=>b.n-a.n);

  const pris=[], html=[];
  const chevauche=(a,b)=>!(a.x2<b.x1||b.x2<a.x1||a.y2<b.y1||b.y2<a.y1);
  for(const e of cands){
    if(html.length>=maxEtiq) break;
    const nom=e.plac.split(",")[0].replace(/^\d{4,5}\s*/,"").trim();
    if(!nom) continue;
    const larg=nom.length*6.1+8, haut=15;
    const x=e.sx+9, y=e.sy-7;
    const boite={x1:x, y1:y, x2:x+larg, y2:y+haut};
    if(pris.some(b=>chevauche(boite,b))) continue;
    pris.push({x1:e.sx-7, y1:e.sy-7, x2:e.sx+7, y2:e.sy+7}, boite);
    html.push(`<span style="position:absolute;left:${x.toFixed(1)}px;top:${y.toFixed(1)}px;
      font-size:11.5px;line-height:15px;color:#22303F;white-space:nowrap;
      text-shadow:0 0 3px #EFEAE0,0 0 3px #EFEAE0,0 0 3px #EFEAE0,0 0 2px #EFEAE0">${esc(nom)}</span>`);
  }
  cap.innerHTML=html.join("");
}
function majInfo(nArcs,nMv){
  const i=$("#infoCarte"); if(!i) return;
  if(CARTE.sel) return;
  const vivants=(CARTE.vies||[]).reduce((n,[a,b])=>n+(a<=CARTE.an && CARTE.an<=b?1:0),0);
  const complet = CARTE.an>=CARTE.anMax;
  i.innerHTML=`
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:3px">
      <span class="mono" style="font-size:19px;font-weight:600;color:var(--greffe)">${complet && CARTE.mode==="cumul" ? "toutes époques" : CARTE.an}</span>
      <span style="color:var(--encre-doux)">${CARTE.mode==="vivants" ? "personnes vivantes : "+vivants.toLocaleString("fr-FR") : ""}</span>
    </div>
    <b>${nMv.toLocaleString("fr-FR")}</b> mouvement${nMv>1?"s":""} · ${nArcs} trajet${nArcs>1?"s":""} distinct${nArcs>1?"s":""}<br>
    <span style="color:var(--greffe)">━</span> filiation &nbsp;
    <span style="color:#33506E">━</span> vie &nbsp;
    <span style="color:#D4A017">━</span> récent<br>
    <span style="color:var(--encre-doux);font-size:11px">${CARTE.mode==="vivants" ? "seuls les vivants à cette date sont tracés" : "tout depuis l'origine, cumulé"}</span>`;
}
function selectionnerLieu(plac){
  CARTE.sel = CARTE.sel===plac ? null : plac;
  dessinerCarte();
  const i=$("#infoCarte");
  if(!CARTE.sel){ majInfo(0,0); return; }
  const L=LIEUX.table.get(plac);
  const gens=[];
  for(const p of M.indis.values())
    for(const e of p.evts) if(e.lieu===plac){ gens.push({p,e}); break; }
  gens.sort((a,b)=>(a.p.anNais??9999)-(b.p.anNais??9999));
  const libPrec={commune:"commune exacte",departement:"centre du département",region:"centre de la région",pays:"centre du pays",manuel:"position saisie"}[L.prec]||L.prec;
  i.innerHTML=`<b>${esc(plac)}</b><br><span style="color:var(--encre-doux)">${L.n} événement${L.n>1?"s":""} · ${libPrec}</span><br>
    ${gens.slice(0,7).map(g=>`<a class="lienPers" data-fiche="${esc(g.p.id)}">${esc(M.nom(g.p.id))}</a> <span class="mono" style="font-size:11px">${g.p.anNais??""}</span>`).join("<br>")}
    ${gens.length>7?`<br><span style="color:var(--encre-doux)">…et ${gens.length-7} autres</span>`:""}
    <br><button class="btn petit clair" style="margin-top:6px" onclick="CARTE.sel=null;dessinerCarte();majInfo(0,0)">Fermer</button>`;
}
/* Légende illustrée : chaque symbole est dessiné, pas seulement décrit */
function majLegende(){
  const el=$("#legendeCarte"); if(!el) return;
  const trait=(col,w,op)=>`<svg width="46" height="14" style="vertical-align:middle;flex:none"><path d="M2,11 Q23,-2 44,11" fill="none" stroke="${col}" stroke-width="${w}" opacity="${op}" stroke-linecap="round"/></svg>`;
  const rond=(r,halo)=>`<svg width="34" height="26" style="vertical-align:middle;flex:none">${halo?`<circle cx="17" cy="13" r="${r*2.1}" fill="#7E2B24" opacity="0.20"/>`:""}<circle cx="17" cy="13" r="${r+1.3}" fill="#7E2B24"/><circle cx="17" cy="13" r="${r}" fill="#F6F0E3"/></svg>`;
  const ligne=(sym,titre,txt)=>`<div style="display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px dashed var(--ligne)">
      <span style="width:48px;display:flex;justify-content:center;padding-top:2px">${sym}</span>
      <span style="flex:1;font-size:13px"><b>${titre}</b><br><span style="color:var(--encre-doux)">${txt}</span></span></div>`;

  const modeVivants = CARTE.mode==="vivants";
  el.innerHTML = `
  <div style="display:grid;grid-template-columns:1fr;gap:0">
    ${ligne(trait("#9E2B33",2.2,0.85),"Trait rouge — filiation",
      "Relie le lieu de naissance d'un parent à celui de son enfant. C'est le déplacement de la lignée d'une génération à la suivante.")}
    ${ligne(trait("#33506E",2.2,0.85),"Trait bleu — vie",
      "Relie le lieu de naissance d'une personne à celui de son décès : le déplacement accompli au cours de sa propre vie.")}
    ${ligne(trait("#D4A017",3.4,1),"Trait doré — mouvement récent",
      "Pendant l'animation, les déplacements survenus dans les vingt années précédant la date affichée.")}
    ${ligne(trait("#9E2B33",4.5,0.85)+trait("#9E2B33",1.1,0.45),"Épaisseur du trait",
      "Plus le trait est épais et net, plus le même trajet a été emprunté par des membres différents de la famille.")}
    ${ligne(rond(9,false),"Taille des cercles",
      "Proportionnelle au nombre d'événements enregistrés dans ce lieu (naissances, mariages, décès…). Les points gardent la même taille à l'écran quel que soit le zoom et restent ancrés à leur commune. Appuyez sur l'un d'eux pour voir qui y est passé.")}
    ${ligne(rond(5,true),"Point entouré d'un halo",
      "Position seulement approchée : la commune exacte n'a pas été reconnue, le point est placé au centre du département, de la région ou du pays. Vous pouvez le corriger dans « Gérer les lieux ».")}
    ${ligne(`<span class="mono" style="font-size:15px;color:var(--greffe);font-weight:600">1850</span>`,"Curseur des années",
      modeVivants
        ? "En mode <b>vivants</b>, seuls les déplacements des personnes en vie à cette date sont tracés : le passé s'efface au fur et à mesure que les générations disparaissent."
        : "En mode <b>cumulé</b>, tous les déplacements survenus jusqu'à cette date restent affichés et s'accumulent.")}
  </div>
  <p class="aide" style="margin-top:10px">
    ${modeVivants
      ? "Quand la date de décès est inconnue, la personne est considérée en vie pendant 85 ans après sa naissance."
      : "Passez en mode « seulement les vivants à cette date » pour voir la famille se renouveler au lieu de s'accumuler."}
  </p>`;
}
function majStats(){
  const s=$("#statsCarte"); if(!s) return;
  const mv=CARTE.mv;
  const dists=mv.map(m=>distanceKm(m.a,m.b)).filter(d=>d>0);
  const moy=dists.length?Math.round(dists.reduce((a,b)=>a+b,0)/dists.length):0;
  const max=dists.length?Math.max(...dists):0;
  const plusLoin=mv[dists.indexOf(max)];
  const parSiecle=new Map();
  for(const m of mv){ if(!m.an) continue; const s=Math.floor(m.an/100)*100; parSiecle.set(s,(parSiecle.get(s)||0)+1); }
  const sc=[...parSiecle.entries()].sort((a,b)=>a[0]-b[0]);
  s.innerHTML=`<ul class="listeTop">
    <li><span>Mouvements retracés</span><b>${mv.length.toLocaleString("fr-FR")}</b></li>
    <li><span>Distance moyenne</span><b>${moy} km</b></li>
    <li><span>Plus grand déplacement</span><b>${max} km</b></li>
    ${plusLoin?`<li><span style="font-size:12px">${esc(plusLoin.de.split(",")[0])} → ${esc(plusLoin.vers.split(",")[0])}</span><b>${plusLoin.an||""}</b></li>`:""}
  </ul>
  <p style="font-size:12px;color:var(--encre-doux);margin-top:8px">Par siècle : ${sc.map(([a,n])=>`${a} <b class="mono">${n}</b>`).join(" · ")}</p>`;
}

/* Zoom / déplacement */
function brancherInteractions(svg){
  CARTE.gestes = activerGestes(svg, CARTE, {
    min: 0.35, max: PROJ.W*1.4,
    pendant: majEtiquettes,          // suit le doigt sans latence
    apres: () => dessinerCarte("zoom")
  });
}

/* Animation temporelle */
function basculerAnimation(){
  const b=$("#btnJouer");
  if(CARTE.jouer){
    CARTE.jouer=false; cancelAnimationFrame(CARTE.timer);
    if(b) b.textContent="▶ Animer";
    dessinerCarte("temps"); return;
  }
  CARTE.jouer=true; if(b) b.textContent="■ Arrêter";
  if(CARTE.an>=CARTE.anMax) CARTE.an=CARTE.anMin;
  const duree=16000;                                   // ~16 s pour parcourir toute la période
  const t0=performance.now(), a0=CARTE.an;
  const etape=()=>{
    if(!CARTE.jouer) return;
    const avance=(performance.now()-t0)/duree*(CARTE.anMax-CARTE.anMin);
    CARTE.an=Math.min(CARTE.anMax, Math.round(a0+avance));
    const c=$("#curAn"); if(c){ c.value=CARTE.an; $("#labAn").textContent=CARTE.an; }
    dessinerCarte("temps");
    if(CARTE.an>=CARTE.anMax){ basculerAnimation(); return; }
    CARTE.timer=requestAnimationFrame(etape);
  };
  CARTE.timer=requestAnimationFrame(etape);
}

/* Panneau de gestion des lieux (correction manuelle des coordonnées) */
function basculerPanneauLieux(lieux){
  const p=$("#panneauLieux");
  if(p.style.display!=="none"){ p.style.display="none"; return; }
  p.style.display="block";
  const tri=[...lieux].sort((a,b)=>{
    const rang={inconnu:0,pays:1,region:2,departement:3,manuel:4,commune:5};
    return (rang[a.prec]-rang[b.prec]) || b.n-a.n;
  });
  p.innerHTML=`<h2>Lieux du registre</h2>
    <p class="aide" style="margin-bottom:10px">Les lieux imprécis apparaissent en premier. Saisissez une latitude et une longitude pour corriger une position — elle sera mémorisée dans le projet.</p>
    <table class="reg"><thead><tr><th>Lieu</th><th>Évts</th><th>Précision</th><th>Latitude</th><th>Longitude</th><th></th></tr></thead><tbody>
    ${tri.map((l,i)=>`<tr>
      <td style="font-size:13px">${esc(l.plac)}</td><td class="mono">${l.n}</td>
      <td><span class="badge ${l.prec==="commune"||l.prec==="manuel"?"ok":l.prec==="inconnu"?"warn":""}">${({commune:"commune",departement:"département",region:"région",pays:"pays",manuel:"manuelle",inconnu:"introuvable"})[l.prec]}</span></td>
      <td><input data-la="${i}" value="${l.lat??""}" style="width:78px;border:1px solid var(--ligne-forte);border-radius:5px;padding:3px 5px;font-size:12px"></td>
      <td><input data-lo="${i}" value="${l.lon??""}" style="width:78px;border:1px solid var(--ligne-forte);border-radius:5px;padding:3px 5px;font-size:12px"></td>
      <td><button class="btn petit clair" data-fix="${i}">Fixer</button></td></tr>`).join("")}
    </tbody></table>`;
  p.querySelectorAll("[data-fix]").forEach(b=>b.addEventListener("click",()=>{
    const i=b.dataset.fix, l=tri[i];
    const la=parseFloat(p.querySelector(`[data-la="${i}"]`).value.replace(",",".")),
          lo=parseFloat(p.querySelector(`[data-lo="${i}"]`).value.replace(",","."));
    if(isNaN(la)||isNaN(lo)||Math.abs(la)>90||Math.abs(lo)>180){ toast("Coordonnées invalides"); return; }
    if(!E.projet.lieux) E.projet.lieux={};
    E.projet.lieux[l.plac]={lat:la,lon:lo};
    marquerModifie();
    toast("Position enregistrée");
    vueCarte();
  }));
}
